  - date: '2026-06-03'
    rating: 2
    summary: >-
      RMIT University has no centralized public developer portal. The most
      genuinely usable public API is the third-party Figshare REST API
      (api.figshare.com/v2), which was probed live and returned real RMIT
      research records as JSON. The RMIT Research Repository on Clarivate
      Esploro is publicly browsable but exposes no documented API or open
      OAI-PMH endpoint (the candidate OAI URLs returned either 404 or a
      JavaScript single-page-app shell, so no working harvest endpoint is
      claimed). Timetable, curriculum catalogue and identity/SSO systems are
      gated behind authentication. The official GitHub org exists but has no
      public repositories. status.rmit.edu.au did not resolve. No endpoints
      were fabricated; only live-verified URLs are recorded below.
    endpoints:
      - url: https://www.rmit.edu.au/
        status: 200
        note: Official university website.
      - url: https://researchrepository.rmit.edu.au/
        status: 200
        note: Research Repository powered by Clarivate Esploro; browsable, no documented API.
      - url: https://rmit.figshare.com/
        status: 202
        note: RMIT Figshare research data repository (Cloudflare 202 challenge on direct curl).
      - url: https://api.figshare.com/v2/articles
        status: 200
        note: Public Figshare REST API; POST search returned live RMIT research records.
      - url: https://researchdata.edu.au/contributors/rmit-university-australia
