---
aid: rmit
name: RMIT University
description: >-
  RMIT University is a public research university in Melbourne, Australia,
  specializing in technology, design and enterprise, and ranked #123 in the
  QS World University Rankings 2025. RMIT does not operate a centralized,
  publicly documented developer portal. Its most accessible programmatic
  surface is its research output: the RMIT Research Repository runs on
  Clarivate's Esploro platform, and RMIT's research data is published via a
  Figshare-hosted repository whose records are exposed through the public
  Figshare REST API (api.figshare.com) and syndicated to Research Data
  Australia. Student-facing systems such as timetables, the curriculum
  catalogue, and identity/SSO sit behind authentication and are not offered
  as public APIs.
