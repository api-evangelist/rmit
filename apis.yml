  - aid: rmit:research-repository
    name: RMIT Research Repository (Esploro)
    description: >-
      The RMIT Research Repository is RMIT University's open access research
      portal, powered by Clarivate's Esploro research information management
      platform. It provides public web-based discovery of RMIT publications
      and research outputs. Esploro supports metadata harvesting integrations,
      but RMIT does not publish a documented public API or open OAI-PMH
      endpoint for the portal.
