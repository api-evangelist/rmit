apis:
  - aid: rmit:figshare-api
    name: RMIT Research Data (Figshare REST API)
    description: >-
      RMIT University's research data, publications and non-traditional
      research outputs are published to a Figshare-hosted institutional
      repository. The publicly accessible records are queryable through the
      shared Figshare REST API v2 (api.figshare.com), which returns RMIT
      article and dataset metadata as JSON. This is a third-party Figshare
      platform API, not an RMIT-operated endpoint.
    humanURL: https://rmit.figshare.com/
